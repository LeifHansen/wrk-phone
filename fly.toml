# fly.toml app configuration file generated for wrk-phone on 2026-05-19T07:07:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wrk-phone'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  DEMO_USER_ID = 'demo'
  NODE_ENV = 'production'
  OPENAI_MODEL = 'gpt-4o-mini'
  PORT = '8080'
  PUBLIC_BASE_URL = 'https://wrk-phone-8ebcfd.fly.dev'

[[mounts]]
  source = 'wrk_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
